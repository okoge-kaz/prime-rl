# SWE RL with Qwen3-30B-A3B-Thinking-2507, based on examples/qwen30b_swe.
# Two training and two inference nodes; r2e-gym-v1 trains and
# swebench-verified-v1 evaluates. Prime Intellect Sandboxes require
# PRIME_API_KEY in .env.

seq_len = 131072

[log]
level = "debug"

[model]
name = "Qwen/Qwen3-30B-A3B-Thinking-2507"

[weight_broadcast]
type = "nccl"

[deployment]
type = "multi_node"
num_train_nodes = 2
num_infer_nodes = 2

[slurm]
job_name = "swe-qwen30b"
partition = "batch"
account = "coreai_horizon_dilations"
time = "2-00:00:00"
project_dir = "/scratch/fsw/portfolios/coreai/projects/coreai_horizon_dilations/users/kfujii/src/prime-rl-v0.7.0"
template_path = "/scratch/fsw/portfolios/coreai/projects/coreai_horizon_dilations/users/kfujii/src/prime-rl-v0.7.0/experiments/training/templates/multi_node_rl_container.sbatch.j2"

[ckpt]
interval = 100

[wandb]
project = "prime-rl-swe"
name = "swe-qwen30b-r2e-gym"

[trainer.model]
impl = "custom"
# FA3 binaries target Hopper; the image builds FlashAttention 2 for sm_103.
attn = "flash_attention_2"
ep = 8
cp = 2

[trainer.model.compile]

[trainer.model.ac_offloading]
max_inflight_activations = 5

[trainer.model.ac]
freq = 1

[trainer.optim]
type = "adamw"
lr = 1e-6

[orchestrator]
batch_size = 512
oversampling_factor = 2
max_off_policy_steps = 16

[[orchestrator.train.env]]
name = "swe"
taskset = { id = "r2e-gym-v1" }
harness = { id = "default", runtime = { type = "prime", labels = ["swe-qwen30b", "swe"] } }

[orchestrator.eval]
interval = 25

[[orchestrator.eval.env]]
name = "swe-bench-verified"
taskset = { id = "swebench-verified-v1" }
harness = { id = "default", runtime = { type = "prime", labels = ["swe-qwen30b", "swe-bench-verified"] } }

[inference.parallel]
tp = 8
