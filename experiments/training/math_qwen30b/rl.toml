max_steps = 100
seq_len = 16384

[log]
level = "debug"

[model]
name = "Qwen/Qwen3-30B-A3B"

[weight_broadcast]
type = "nccl"

[deployment]
type = "multi_node"
num_train_nodes = 1
num_infer_nodes = 1

[slurm]
job_name = "math-qwen30b"
partition = "batch"
account = "coreai_horizon_dilations"
time = "2:00:00"
# Limit teardown grace time after a component failure; zero tears down immediately.
cleanup_grace_period = 300
project_dir = "/lustre/fsw/portfolios/coreai/projects/coreai_horizon_dilations/users/kfujii/src/prime-rl-v0.7.0"
template_path = "/lustre/fsw/portfolios/coreai/projects/coreai_horizon_dilations/users/kfujii/src/prime-rl-v0.7.0/experiments/training/templates/multi_node_rl_container.sbatch.j2"

[ckpt]
interval = 25
output_dir = "/lustre/fsw/portfolios/coreai/users/kfujii/checkpoints/prime-rl/math/qwen30b-a3b"

[wandb]
project = "prime-rl-math"
name = "math-qwen-30b-a3b"

[trainer.model]
impl = "custom"
attn = "flash_attention_2"
ep = 4
cp = 2

[trainer.model.compile]

[trainer.model.ac]
freq = 1

[trainer.optim]
type = "adamw"
lr = 1e-6

[orchestrator]
batch_size = 256
group_size = 8

[orchestrator.train.sampling]
max_completion_tokens = 14336

[[orchestrator.train.env]]
name = "math"
taskset = { id = "i3_math_v1" }
harness = { id = "null", runtime = { type = "subprocess" } }

[orchestrator.eval]
interval = 25

[[orchestrator.eval.env]]
name = "aime2025"
taskset = { id = "aime25-v1" }
harness = { id = "null", runtime = { type = "subprocess" } }

[inference.parallel]
tp = 2

# On B300, automatic selection previously chose FlashInfer TRT-LLM MoE, whose
# tp8 shard width 768/8=96 violates 128-element block alignment. Keep the
# verified Triton MoE backend. The CUDA 13 image can JIT compute_103a kernels;
# a CUDA 12.8 image may also require explicit attention and sampler backends:
#   [inference.vllm_extra]
#   kernel_config = { moe_backend = "triton" }
#   attention_backend = "FLASH_ATTN"
