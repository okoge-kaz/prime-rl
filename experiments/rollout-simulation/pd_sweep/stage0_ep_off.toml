# Stage 0 arm 1: EP-off control.
# Four tp2 x dp4 engines run independently without MoE all-to-all or DP
# lockstep. A large per-request throughput gain implicates EP overhead. The
# 106B bf16 model fits at about 106 GB/GPU with tp2 on 288 GB B300 GPUs.
#
# Launch from a compute node inside the CUDA 13 container:
#   uv run inference @ experiments/rollout-simulation/pd_sweep/stage0_ep_off.toml

gpu_memory_utilization = 0.9
enable_expert_parallel = false
enable_fp32_lm_head = true
enable_fp32_router_logits = true

[server]
port = 8000

[model]
name = "PrimeIntellect/INTELLECT-3"
tool_call_parser = "qwen3_coder"
reasoning_parser = "deepseek_r1"

[parallel]
tp = 2
dp = 4

[log]
level = "info"

# With EP off, expert weights are TP-sharded and FlashInfer TRTLLM MoE cannot
# transform the shard layout (view [4096,2,128] vs 1441792). Force Triton MoE
# as a workaround. This arm therefore compares the complete EP and non-EP
# stacks, including different MoE kernels.
[vllm_extra.kernel_config]
moe_backend = "triton"
