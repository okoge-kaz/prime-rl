# PD-disaggregated variant of math_qwen30b/rl.toml. Training hyperparameters
# remain unchanged; inference uses one prefill and one decode node, for three
# total nodes including the trainer.
#
# Requires the CUDA 13 disaggregated image with NIXL, UCX, DeepEP, and DeepGEMM.
# The container template supplies prefill/decode endpoints to vllm-router.

max_steps = 100
seq_len = 16384

[log]
level = "debug"

[model]
name = "Qwen/Qwen3-30B-A3B"

[weight_broadcast]
type = "nccl"

[deployment]
type = "multi_node"
num_train_nodes = 1
# num_infer_nodes is derived from inference.deployment.

[inference]
# Use EFA-native KV transfer. Set ["UCX"] only when measuring the TCP baseline.
nixl_backends = ["LIBFABRIC"]
# Retain prefill KV long enough for startup bursts to reach decode scheduling.
nixl_kv_lease_duration = 300

[inference.deployment]
type = "disaggregated"
prefill_nodes_per_replica = 1
decode_nodes_per_replica = 1
num_prefill_replicas = 1
num_decode_replicas = 1

[slurm]
job_name = "math-qwen30b-disagg"
partition = "batch"
account = "coreai_horizon_dilations"
time = "2:00:00"
# Limit teardown grace time after a component failure.
cleanup_grace_period = 300
project_dir = "/lustre/fsw/portfolios/coreai/projects/coreai_horizon_dilations/users/kfujii/src/prime-rl-v0.7.0"
template_path = "/lustre/fsw/portfolios/coreai/projects/coreai_horizon_dilations/users/kfujii/src/prime-rl-v0.7.0/experiments/training/templates/multi_node_rl_container.sbatch.j2"

[ckpt]
interval = 25
output_dir = "/lustre/fsw/portfolios/coreai/users/kfujii/checkpoints/prime-rl/math/qwen30b-a3b-disagg"

[wandb]
project = "prime-rl-math"
name = "math-qwen-30b-a3b-disagg"

[trainer.model]
impl = "custom"
attn = "flash_attention_2"
ep = 4
cp = 2

[trainer.model.compile]

[trainer.model.ac]
freq = 1

[trainer.optim]
type = "adamw"
lr = 1e-6

[orchestrator]
batch_size = 256
group_size = 8

[orchestrator.train.sampling]
max_completion_tokens = 14336

[[orchestrator.train.env]]
name = "math"
taskset = { id = "i3_math_v1" }
harness = { id = "null", runtime = { type = "subprocess" } }

[orchestrator.eval]
interval = 25

[[orchestrator.eval.env]]
name = "aime2025"
taskset = { id = "aime25-v1" }
harness = { id = "null", runtime = { type = "subprocess" } }

[inference.parallel]
tp = 2

# Keep the verified Triton MoE backend because the tp8 shard width 768/8=96
# violates FlashInfer TRT-LLM MoE block alignment. CUDA 12.8 images may also
# require explicit attention and sampler backends:
#   [inference.vllm_extra]
#   kernel_config = { moe_backend = "triton" }
#   attention_backend = "FLASH_ATTN"
